spring:
  application:
    name: mayk-enterprise-kit-lite
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  main:
    lazy-initialization: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    test-connection: false
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=60s
  data:
    redis:
      cache-prefix: ${REDIS_CACHE_PREFIX:aek_lite_}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 31536000
        cachecontrol:
          max-age: 31536000
          public: true
          must-revalidate: false

jwt:
  secret: ${JWT_SECRET:Q0hBTkdFX01FX0lOX1BST0RfVE9fQV9WQUxJRF9CQVNFNjRfRU5DT0RFRF9TRUNSRVRfS0VZ}
  expiration: ${JWT_EXPIRATION:3600}


app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8080}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:noreply@maykamasifuen.com}


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false

server:
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,text/css,application/javascript,application/x-javascript,image/svg+xml,font/woff2
    min-response-size: 1024
  # Ensure static assets get proper cache headers
  servlet:
    session:
      timeout: 30m

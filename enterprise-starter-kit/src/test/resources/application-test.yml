spring:
  datasource:
    url: jdbc:h2:mem:esk_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  liquibase:
    enabled: false

jwt:
  # Test-only secret. Must be Base64 for JwtUtils.
  secret: Q0hBTkdFX01FX0lOX1BST0RfVE9fQV9WQUxJRF9CQVNFNjRfRU5DT0RFRF9TRUNSRVRfS0VZ
  expiration: 3600

# Keep tests quiet/fast
logging:
  level:
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn

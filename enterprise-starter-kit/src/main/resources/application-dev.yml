spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:mayk_enterprise_kit_lite}
    username: ${DB_USERNAME:esk_user}
    password: ${DB_PASSWORD:esk_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    enabled: true

# Development-specific settings
logging:
  level:
    com.enterprise.starter.kit: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

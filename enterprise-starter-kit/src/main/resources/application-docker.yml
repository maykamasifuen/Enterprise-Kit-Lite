spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:mayk_enterprise_kit_lite}
    username: ${DB_USERNAME:eskuser}
    password: ${DB_PASSWORD:eskpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    enabled: true

# Docker-specific settings
logging:
  level:
    com.enterprise.starter.kit: INFO
    org.springframework.security: DEBUG
    liquibase: INFO

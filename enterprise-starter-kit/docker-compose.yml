# Development Database Setup — PostgreSQL
# Run: docker-compose up -d (from enterprise-starter-kit/ directory)
# This starts only the database for local development with the local-pg profile.
# Use with: -Dspring.profiles.active=dev,local-pg

services:
  postgres:
    image: postgres:16-alpine
    container_name: esk-postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-mayk_enterprise_kit_lite}
      POSTGRES_USER: ${DB_USERNAME:-esk_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-esk_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-esk_user} -d ${DB_NAME:-mayk_enterprise_kit_lite}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
